<!DOCTYPE html>
<html>
<head>
    <title>My Todo List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .todo-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
        .completed { text-decoration: line-through; color: gray; }
        .tag { background: #007bff; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Activities</h1>
    {% for todo in todos %}
        <div class="todo-item">
            <div>
                <strong class="{% if todo.completed %}completed{% endif %}">
                    {{ todo.title }}
                </strong>
                <p>{{ todo.description }}</p>
            </div>
            {% if todo.completed %}
                <span class="tag">Finished</span>
            {% else %}
                <span class="tag" style="background: #28a745;">Active</span>
            {% endif %}
        </div>
    {% empty %}
        <p>No activities yet. Go to the Admin panel to add "Learn Python"!</p>
    {% endfor %}
</div>

</body>
</html>
